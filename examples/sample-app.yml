# A tiny labeled service demonstrating the tailswarm tsnet design.
#
#   docker stack deploy -c sample-app.yml billing
#
# Once deployed, tailswarm (running elsewhere on the swarm) will:
#
#   1. Mint an ephemeral Headscale pre-auth key tagged tag:billing.
#   2. Bring up an in-process tsnet.Server with hostname "billing-api"
#      and a TCP listener on port 80.
#   3. Forward every connection on that listener to billing_api:80
#      (the service's Swarm DNS name) over the shared overlay.
#
# Stripping the tailswarm.enable label, or removing this service, makes
# tailswarm close the tsnet server. Headscale auto-cleans the ephemeral
# node once it disconnects.

version: "3.8"

services:
  api:
    image: nginxdemos/hello:plain-text
    networks:
      - tailswarm-overlay
    ports:
      # Ports declared here are picked up automatically — there is no
      # tailswarm.ports label. TCP only.
      - target: 80
        published: 0
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      labels:
        # Required: opt the service into the tailnet.
        tailswarm.enable: "true"

        # Optional: tailnet hostname. Defaults to <stack>-<service>,
        # which would be "billing-api" anyway — shown for completeness.
        tailswarm.hostname: "billing-api"

        # Optional: ACL tag override. Must match one of the tailswarm
        # config's allowed_tags glob patterns (e.g. "tag:billing").
        # If unset, the derived tag tag:swarm-api is used.
        tailswarm.tag: "tag:billing"

networks:
  tailswarm-overlay:
    external: true
