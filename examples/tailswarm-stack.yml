# tailswarm itself, deployed as a Swarm stack.
#
#   docker stack deploy -c tailswarm-stack.yml tailswarm
#
# Before deploying:
#
#   1. Create the Headscale API token as a Docker secret:
#        printf '%s' "$HEADSCALE_API_KEY" | \
#          docker secret create tailswarm_headscale_api_key -
#
#   2. Create the YAML config as a Docker config (edit headscale.url +
#      headscale.user to match your environment):
#        docker config create tailswarm_config tailswarm.yml
#
#   3. Create the shared overlay every managed service joins:
#        docker network create -d overlay --attachable tailswarm-overlay
#
#   4. Create the internal overlay between tailswarm and the socket proxy:
#        docker network create -d overlay --attachable tailswarm-internal
#
#   5. Create the volume that holds tsnet node identities:
#        docker volume create tailswarm-tsnet-state
#
# tailswarm runs an in-process tsnet.Server per opted-in service and
# forwards TCP traffic to <stack>_<service>:<port> over the shared
# overlay. No sidecars, no NET_ADMIN, no /dev/net/tun.
#
# tailswarm never touches the raw Docker socket. It talks to a
# tecnativa/docker-socket-proxy sidecar constrained to a manager node,
# and only the read-side API sections are enabled — the tsnet design
# never creates, updates, or removes Docker services.

version: "3.8"

services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    networks:
      - tailswarm-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      SERVICES: 1
      NETWORKS: 1
      TASKS: 1
      EVENTS: 1
      # No POST — tailswarm has no write paths in the tsnet design.
      POST: 0
      CONTAINERS: 0
      EXEC: 0
      IMAGES: 0
      VOLUMES: 0
      SECRETS: 0
      CONFIGS: 0
      AUTH: 0
      SWARM: 0
      NODES: 0
      BUILD: 0
      PLUGINS: 0
      SYSTEM: 0
      INFO: 0
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  tailswarm:
    image: ghcr.io/getlydian/tailswarm:edge
    networks:
      - tailswarm-internal
      - tailswarm-overlay
    environment:
      DOCKER_HOST: tcp://docker-proxy:2375
      TAILSWARM_CONFIG: /etc/tailswarm/tailswarm.yml
      TAILSWARM_HEADSCALE_API_KEY_FILE: /run/secrets/tailswarm_headscale_api_key
    configs:
      - source: tailswarm_config
        target: /etc/tailswarm/tailswarm.yml
    secrets:
      - tailswarm_headscale_api_key
    volumes:
      - tailswarm-tsnet-state:/var/lib/tailswarm
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      update_config:
        order: stop-first
    depends_on:
      - docker-proxy

networks:
  tailswarm-internal:
    external: true
  tailswarm-overlay:
    external: true

configs:
  tailswarm_config:
    external: true

secrets:
  tailswarm_headscale_api_key:
    external: true

volumes:
  tailswarm-tsnet-state:
    external: true
